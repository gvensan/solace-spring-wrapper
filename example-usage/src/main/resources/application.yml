spring:
  application:
    name: solace-example

# Web server — 8080 is taken by the local Solace broker, so serve the app (and actuator) on 8081
server:
  port: 8081

# Solace configuration
solace:
  host: tcp://localhost:55554
  msg-vpn: default
  client-username: default
  client-password: default
  client-name: ${spring.application.name}

  # Connection settings
  connect-timeout-in-millis: 30000
  reconnect-retries: true
  reconnection-attempts: 3

  # Message settings
  generate-send-timestamps: true
  generate-receive-timestamps: true

  # Metrics (wrapper). Enabled by default when Micrometer is on the classpath.
  metrics:
    enabled: true
    include-destination-tag: true

# Actuator: expose health, metrics and the Prometheus scrape endpoint
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.solace.wrapper: DEBUG
    com.example.myapp: DEBUG
    com.solacesystems: WARN
